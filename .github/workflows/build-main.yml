name: Publish Product CBT

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Validate API route registry
        shell: bash
        run: |
          set -euo pipefail
          node --check server/router/registerApiRoutes.js
          node --input-type=module -e "await import('./server/router/registerApiRoutes.js'); process.exit(0)"

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish branch product/cbt
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin
          git checkout -B product/cbt
          git add -f client/dist
          git commit -m "build(product/cbt): publish from ${GITHUB_SHA::7}"
          git push origin product/cbt --force

name: Publish Product CBT + DB + LMS + Finance + Tahfiz

on:
  push:
    branches:
      - feature/db
      - feature/lms
      - feature/finance
      - feature/tahfiz
  workflow_run:
    workflows:
      - Sync Main To Feature Branches
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_BRANCH: release/cbt-db-lms-finance-tahfiz
  PRODUCT_BRANCH: product/cbt-db-lms-finance-tahfiz
  VITE_PRODUCT_PROFILE: educore-cbt-db-lms-finance-tahfiz

permissions:
  contents: write

concurrency:
  group: publish-cbt-db-lms-finance-tahfiz
  cancel-in-progress: true

jobs:
  compose:
    if: |
      (github.event_name != 'push' || github.actor != 'github-actions[bot]') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compose integration branch
        shell: bash
        run: |
          set -euo pipefail

          merge_branch() {
            local source_branch="$1"
            local merge_message="chore(compose): merge ${source_branch} into ${COMPOSE_BRANCH}"

            if git merge "origin/${source_branch}" --no-ff -X theirs -m "${merge_message}"; then
              echo "Merged ${source_branch} into ${COMPOSE_BRANCH}"
            else
              echo "Conflict detected while merging ${source_branch}; preferring incoming branch content"
              git checkout --theirs .
              git add -A
              git commit -m "${merge_message} (auto-resolved)"
            fi
          }

          git fetch origin
          git checkout -B "${COMPOSE_BRANCH}" origin/main

          merge_branch "feature/db"
          merge_branch "feature/lms"
          merge_branch "feature/finance"
          merge_branch "feature/tahfiz"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Normalize composed route and finance menu modules
        shell: bash
        run: |
          set -euo pipefail

          git checkout origin/feature/finance -- client/src/components/layout/menus/financeMenus.jsx
          git checkout origin/feature/lms -- client/src/routes/modules/roleRoutes.jsx

          cat <<'EOF' > client/src/routes/modules/dbRoutes.jsx
          import { lazy } from "react";
          import { Route } from "react-router-dom";

          import RouteProtection from "../../utils/RouteProtection";

          const DatabaseManager = lazy(
            () => import("../../module/database/manager/DatabaseManager"),
          );
          const ClassDbManager = lazy(
            () => import("../../module/database/manager/ClassDbManager"),
          );
          const StudentDatabase = lazy(
            () => import("../../module/database/view/StudentDatabase"),
          );
          const ParentStudentDatabase = lazy(
            () => import("../../module/database/view/ParentStudentDatabase"),
          );

          const renderDbRoutes = ({ LazyPage }) => {
            const Page = LazyPage;

            return (
              <>
                <Route
                  element={
                    <RouteProtection allowedRoles={["admin"]} allowedLevels={["satuan"]} />
                  }
                >
                  <Route
                    path="/admin-database"
                    element={<Page title="Database Siswa" Component={DatabaseManager} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["teacher"]} />}>
                  <Route
                    path="/guru-database-kelas"
                    element={<Page title="Database Kelas" Component={ClassDbManager} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["student"]} />}>
                  <Route
                    path="/siswa-database"
                    element={<Page title="Database Siswa" Component={StudentDatabase} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["parent"]} />}>
                  <Route
                    path="/orangtua-database-siswa"
                    element={
                      <Page title="Database Data Siswa" Component={ParentStudentDatabase} />
                    }
                  />
                </Route>
              </>
            );
          };

          export default renderDbRoutes;
          EOF

          cat <<'EOF' > client/src/routes/modules/financeRoutes.jsx
          import { lazy } from "react";
          import { Route } from "react-router-dom";

          import RouteProtection from "../../utils/RouteProtection";

          const FinanceDash = lazy(
            () => import("../../module/finance/dashboard/FinanceDash"),
          );
          const Monthly = lazy(() => import("../../module/finance/fee/monthly/Monthly"));
          const Others = lazy(() => import("../../module/finance/fee/others/Others"));
          const Transaction = lazy(
            () => import("../../module/finance/fee/transaction/Transaction"),
          );
          const SavingReport = lazy(
            () => import("../../module/finance/report/SavingReport"),
          );
          const CashReport = lazy(() => import("../../module/finance/report/CashReport"));
          const Setting = lazy(() => import("../../module/finance/setting/Setting"));
          const TeacherContribution = lazy(
            () => import("../../module/finance/teacher/contribution/Contribution"),
          );
          const TeacherSaving = lazy(
            () => import("../../module/finance/teacher/saving/Saving"),
          );
          const StudentContribution = lazy(
            () => import("../../module/finance/student/contribution/StudentContribution"),
          );
          const StudentSaving = lazy(
            () => import("../../module/finance/student/saving/StudentSaving"),
          );
          const ParentPayment = lazy(
            () => import("../../module/finance/parent/transaction/ParentTransaction"),
          );
          const ParentSavingReport = lazy(
            () => import("../../module/finance/report/SavingReport"),
          );

          const renderFinanceRoutes = ({ LazyPage }) => {
            const Page = LazyPage;

            return (
              <>
                <Route
                  element={
                    <RouteProtection
                      allowedRoles={["admin"]}
                      allowedLevels={["finance", "keuangan"]}
                    />
                  }
                >
                  <Route
                    path="/finance-dashboard"
                    element={<Page title="Dashboard Keuangan" Component={FinanceDash} />}
                  />
                  <Route
                    path="/finance/pembayaran-spp"
                    element={<Page title="Pembayaran SPP" Component={Monthly} />}
                  />
                  <Route
                    path="/finance/pembayaran-lainnya"
                    element={<Page title="Pembayaran Lainnya" Component={Others} />}
                  />
                  <Route
                    path="/finance/transaksi"
                    element={<Page title="Transaksi Keuangan" Component={Transaction} />}
                  />
                  <Route
                    path="/finance/laporan-tabungan"
                    element={<Page title="Laporan Tabungan" Component={SavingReport} />}
                  />
                  <Route
                    path="/finance/laporan-kas-kelas"
                    element={<Page title="Laporan Kas Kelas" Component={CashReport} />}
                  />
                  <Route
                    path="/finance/pengaturan"
                    element={<Page title="Pengaturan Keuangan" Component={Setting} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["teacher"]} />}>
                  <Route
                    path="/guru/keuangan-kelas"
                    element={<Page title="Keuangan Kelas" Component={TeacherContribution} />}
                  />
                  <Route
                    path="/guru/tabungan"
                    element={<Page title="Tabungan Kelas" Component={TeacherSaving} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["student"]} />}>
                  <Route
                    path="/siswa/laporan-tabungan"
                    element={<Page title="Tabungan Saya" Component={StudentSaving} />}
                  />
                  <Route
                    path="/siswa/laporan-uang-kas"
                    element={<Page title="Laporan Uang Kas" Component={StudentContribution} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["parent"]} />}>
                  <Route
                    path="/orangtua/pembayaran"
                    element={<Page title="Pembayaran" Component={ParentPayment} />}
                  />
                  <Route
                    path="/orangtua/laporan-tabungan"
                    element={<Page title="Laporan Tabungan" Component={ParentSavingReport} />}
                  />
                </Route>
              </>
            );
          };

          export default renderFinanceRoutes;
          EOF

      - name: Lint route modules
        run: npm exec eslint src/routes/modules/*.jsx
        working-directory: client

      - name: Build composed branch
        run: npm run build
        working-directory: client

      - name: Validate composed API route registry
        shell: bash
        run: |
          set -euo pipefail
          node --check server/router/registerApiRoutes.js

          git push origin "${COMPOSE_BRANCH}" --force

  publish:
    needs: compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout composed branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: release/cbt-db-lms-finance-tahfiz

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Normalize composed route and finance menu modules
        shell: bash
        run: |
          set -euo pipefail

          git checkout origin/feature/finance -- client/src/components/layout/menus/financeMenus.jsx
          git checkout origin/feature/lms -- client/src/routes/modules/roleRoutes.jsx

          cat <<'EOF' > client/src/routes/modules/dbRoutes.jsx
          import { lazy } from "react";
          import { Route } from "react-router-dom";

          import RouteProtection from "../../utils/RouteProtection";

          const DatabaseManager = lazy(
            () => import("../../module/database/manager/DatabaseManager"),
          );
          const ClassDbManager = lazy(
            () => import("../../module/database/manager/ClassDbManager"),
          );
          const StudentDatabase = lazy(
            () => import("../../module/database/view/StudentDatabase"),
          );
          const ParentStudentDatabase = lazy(
            () => import("../../module/database/view/ParentStudentDatabase"),
          );

          const renderDbRoutes = ({ LazyPage }) => {
            const Page = LazyPage;

            return (
              <>
                <Route
                  element={
                    <RouteProtection allowedRoles={["admin"]} allowedLevels={["satuan"]} />
                  }
                >
                  <Route
                    path="/admin-database"
                    element={<Page title="Database Siswa" Component={DatabaseManager} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["teacher"]} />}>
                  <Route
                    path="/guru-database-kelas"
                    element={<Page title="Database Kelas" Component={ClassDbManager} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["student"]} />}>
                  <Route
                    path="/siswa-database"
                    element={<Page title="Database Siswa" Component={StudentDatabase} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["parent"]} />}>
                  <Route
                    path="/orangtua-database-siswa"
                    element={
                      <Page title="Database Data Siswa" Component={ParentStudentDatabase} />
                    }
                  />
                </Route>
              </>
            );
          };

          export default renderDbRoutes;
          EOF

          cat <<'EOF' > client/src/routes/modules/financeRoutes.jsx
          import { lazy } from "react";
          import { Route } from "react-router-dom";

          import RouteProtection from "../../utils/RouteProtection";

          const FinanceDash = lazy(
            () => import("../../module/finance/dashboard/FinanceDash"),
          );
          const Monthly = lazy(() => import("../../module/finance/fee/monthly/Monthly"));
          const Others = lazy(() => import("../../module/finance/fee/others/Others"));
          const Transaction = lazy(
            () => import("../../module/finance/fee/transaction/Transaction"),
          );
          const SavingReport = lazy(
            () => import("../../module/finance/report/SavingReport"),
          );
          const CashReport = lazy(() => import("../../module/finance/report/CashReport"));
          const Setting = lazy(() => import("../../module/finance/setting/Setting"));
          const TeacherContribution = lazy(
            () => import("../../module/finance/teacher/contribution/Contribution"),
          );
          const TeacherSaving = lazy(
            () => import("../../module/finance/teacher/saving/Saving"),
          );
          const StudentContribution = lazy(
            () => import("../../module/finance/student/contribution/StudentContribution"),
          );
          const StudentSaving = lazy(
            () => import("../../module/finance/student/saving/StudentSaving"),
          );
          const ParentPayment = lazy(
            () => import("../../module/finance/parent/transaction/ParentTransaction"),
          );
          const ParentSavingReport = lazy(
            () => import("../../module/finance/report/SavingReport"),
          );

          const renderFinanceRoutes = ({ LazyPage }) => {
            const Page = LazyPage;

            return (
              <>
                <Route
                  element={
                    <RouteProtection
                      allowedRoles={["admin"]}
                      allowedLevels={["finance", "keuangan"]}
                    />
                  }
                >
                  <Route
                    path="/finance-dashboard"
                    element={<Page title="Dashboard Keuangan" Component={FinanceDash} />}
                  />
                  <Route
                    path="/finance/pembayaran-spp"
                    element={<Page title="Pembayaran SPP" Component={Monthly} />}
                  />
                  <Route
                    path="/finance/pembayaran-lainnya"
                    element={<Page title="Pembayaran Lainnya" Component={Others} />}
                  />
                  <Route
                    path="/finance/transaksi"
                    element={<Page title="Transaksi Keuangan" Component={Transaction} />}
                  />
                  <Route
                    path="/finance/laporan-tabungan"
                    element={<Page title="Laporan Tabungan" Component={SavingReport} />}
                  />
                  <Route
                    path="/finance/laporan-kas-kelas"
                    element={<Page title="Laporan Kas Kelas" Component={CashReport} />}
                  />
                  <Route
                    path="/finance/pengaturan"
                    element={<Page title="Pengaturan Keuangan" Component={Setting} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["teacher"]} />}>
                  <Route
                    path="/guru/keuangan-kelas"
                    element={<Page title="Keuangan Kelas" Component={TeacherContribution} />}
                  />
                  <Route
                    path="/guru/tabungan"
                    element={<Page title="Tabungan Kelas" Component={TeacherSaving} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["student"]} />}>
                  <Route
                    path="/siswa/laporan-tabungan"
                    element={<Page title="Tabungan Saya" Component={StudentSaving} />}
                  />
                  <Route
                    path="/siswa/laporan-uang-kas"
                    element={<Page title="Laporan Uang Kas" Component={StudentContribution} />}
                  />
                </Route>

                <Route element={<RouteProtection allowedRoles={["parent"]} />}>
                  <Route
                    path="/orangtua/pembayaran"
                    element={<Page title="Pembayaran" Component={ParentPayment} />}
                  />
                  <Route
                    path="/orangtua/laporan-tabungan"
                    element={<Page title="Laporan Tabungan" Component={ParentSavingReport} />}
                  />
                </Route>
              </>
            );
          };

          export default renderFinanceRoutes;
          EOF

      - name: Lint route modules
        run: npm exec eslint src/routes/modules/*.jsx
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish branch product/cbt-db-lms-finance-tahfiz
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin
          git checkout -B "${PRODUCT_BRANCH}"
          git add -A -f client/dist
          if git diff --cached --quiet; then
            echo "No client/dist changes to publish"
            exit 0
          fi
          git commit -m "build(${PRODUCT_BRANCH}): publish from ${GITHUB_SHA::7}"
          git push origin "${PRODUCT_BRANCH}" --force

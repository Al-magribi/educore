name: Publish Product CBT + DB + LMS + Finance + Tahfiz

on:
  push:
    branches:
      - feature/db
      - feature/lms
      - feature/finance
      - feature/tahfiz
  workflow_run:
    workflows:
      - Sync Main To Feature Branches
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_BRANCH: release/cbt-db-lms-finance-tahfiz
  PRODUCT_BRANCH: product/cbt-db-lms-finance-tahfiz
  VITE_PRODUCT_PROFILE: educore-cbt-db-lms-finance-tahfiz

permissions:
  contents: write

concurrency:
  group: publish-cbt-db-lms-finance-tahfiz
  cancel-in-progress: true

jobs:
  compose:
    if: |
      (github.event_name != 'push' || github.actor != 'github-actions[bot]') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compose integration branch
        shell: bash
        run: |
          set -euo pipefail

          merge_branch() {
            local source_branch="$1"
            local merge_message="chore(compose): merge ${source_branch} into ${COMPOSE_BRANCH}"

            if git merge "origin/${source_branch}" --no-ff -X theirs -m "${merge_message}"; then
              echo "Merged ${source_branch} into ${COMPOSE_BRANCH}"
            else
              echo "Conflict detected while merging ${source_branch}; preferring incoming branch content"
              git checkout --theirs .
              git add -A
              git commit -m "${merge_message} (auto-resolved)"
            fi
          }

          git fetch origin
          git checkout -B "${COMPOSE_BRANCH}" origin/main

          merge_branch "feature/db"
          merge_branch "feature/lms"
          merge_branch "feature/finance"
          merge_branch "feature/tahfiz"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build composed branch
        run: npm run build
        working-directory: client

      - name: Validate composed API route registry
        shell: bash
        run: |
          set -euo pipefail
          node --check server/router/registerApiRoutes.js

          # Keep workflow files unchanged on release branch to avoid
          # requiring `workflows` permission for GitHub App pushes.
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/${COMPOSE_BRANCH}"; then
            git checkout "origin/${COMPOSE_BRANCH}" -- .github/workflows
          else
            git checkout origin/main -- .github/workflows
          fi
          git add .github/workflows
          if ! git diff --cached --quiet; then
            git commit -m "chore(compose): align workflows for ${COMPOSE_BRANCH}"
          fi

          git push origin "${COMPOSE_BRANCH}" --force

  publish:
    needs: compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout composed branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: release/cbt-db-lms-finance-tahfiz

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish branch product/cbt-db-lms-finance-tahfiz
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin
          git checkout -B "${PRODUCT_BRANCH}"
          git add -A -f client/dist
          if git diff --cached --quiet; then
            echo "No client/dist changes to publish"
            exit 0
          fi
          git commit -m "build(${PRODUCT_BRANCH}): publish from ${GITHUB_SHA::7}"
          git push origin "${PRODUCT_BRANCH}" --force

name: Sync Main To Feature Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: sync-main-to-features
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch:
          - feature/db
          - feature/lms
          - feature/tahfiz
          - feature/finance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into ${{ matrix.branch }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ matrix.branch }}"
          MERGE_MESSAGE="chore(sync): merge main into ${TARGET_BRANCH}"
          WORKFLOW_DIR=".github/workflows"

          git fetch origin
          git checkout "${TARGET_BRANCH}"

          if git merge origin/main --no-ff --no-commit -X theirs; then
            echo "Merge prepared for ${TARGET_BRANCH}"
          else
            echo "Conflict detected on ${TARGET_BRANCH}, resolving by preferring main branch content"
            git checkout --theirs .
            git add -A
          fi

          # Keep workflow files from the target branch.
          # This sync job only carries regular app changes from `main`.
          # Workflow updates remain managed from `main` as the source of truth.
          if [ -d "${WORKFLOW_DIR}" ]; then
            git checkout HEAD -- "${WORKFLOW_DIR}"
            git add "${WORKFLOW_DIR}"
          fi

          if git diff --cached --quiet; then
            echo "No syncable changes for ${TARGET_BRANCH}"
            git merge --abort
            exit 0
          fi

          git commit -m "${MERGE_MESSAGE}"
          git push origin "HEAD:${TARGET_BRANCH}"
